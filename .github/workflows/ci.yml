name: API CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      KONG_ADMIN_URL: https://4f1b-103-184-87-251.ngrok-free.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman

      - name: Install Kong Deck
        uses: kong/setup-deck@v1

      - name: Check Kong Deck Connection
        run: deck gateway ping --kong-addr $KONG_ADMIN_URL

      - name: Check Difference In Configuration
        id: deck_diff
        shell: bash
        run: |
          set +e
          deck gateway diff --kong-addr "$KONG_ADMIN_URL" --non-zero-exit-code kong/kong.yml
          diff_status=$?
          set -e

          if [ "$diff_status" -eq 0 ]; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
            echo "No Kong Gateway configuration changes found. Skipping sync and tests."
          elif [ "$diff_status" -eq 2 ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
            echo "Kong Gateway configuration changes found. Continuing to validate and sync."
          else
            echo "deck gateway diff failed with exit code $diff_status."
            exit "$diff_status"
          fi

      - name: Validate The Configuration
        if: steps.deck_diff.outputs.has_diff == 'true'
        run: deck gateway validate --kong-addr $KONG_ADMIN_URL kong/kong.yml

      - name: Sync Config to Kong
        if: steps.deck_diff.outputs.has_diff == 'true'
        run: deck gateway sync --kong-addr $KONG_ADMIN_URL kong/kong.yml

      - name: Run API tests
        if: steps.deck_diff.outputs.has_diff == 'true'
        run: newman run postman/fact-service-test.postman_collection.json
