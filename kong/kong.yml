_format_version: '3.0'
plugins:
  - config:
      ai_metrics: true
      bandwidth_metrics: true
      latency_metrics: true
      per_consumer: true
      status_code_metrics: true
      upstream_health_metrics: true
      wasm_metrics: true
    enabled: true
    name: prometheus
    protocols:
      - grpc
      - grpcs
      - http
      - https
services:
  - connect_timeout: 60000
    enabled: true
    host: host.docker.internal
    name: alpha-services
    port: 3009
    protocol: http
    read_timeout: 60000
    retries: 5
    routes:
      - https_redirect_status_code: 426
        methods:
          - GET
        name: alpha-route
        path_handling: v0
        paths:
          - /alpha
        preserve_host: false
        protocols:
          - http
          - https
        regex_priority: 0
        request_buffering: true
        response_buffering: true
        strip_path: true
    write_timeout: 60000
